name: Go Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - uses: actions/setup-go@v2
      with:
        go-version: 1.17

#    - name: Install UPX
#      run: sudo apt-get install -y upx

    - name: Go Get Govvv
      run: go get github.com/ahmetb/govvv

    - name: Go Get
      run: go get

    - name: Tests
      run: make test

    - name: Build for Linux (amd64)
      run: make build
      #run: go build -v -o mj -ldflags="$(govvv -flags -pkg $(go list ./version)) -s -w"

    - name: Test Build
      run: ./mj example/example.csv --sort
