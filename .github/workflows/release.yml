name: Release

on:
  push:
    tags: [ "*" ]
    #branches: [ "main" ]
#  release:
#    types: [created]

jobs:
  generate:
    name: Create release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: "1.17"

      - name: Go Get Govvv
        run: go get github.com/ahmetb/govvv

      - name: Go Get
        run: go get

      - name: Install the Ultimate Packer of Executables
        run: sudo apt install -y upx

      - name: Generate the artifacts
        run: make release

#      - name: Grant execution permission
#        run: chmod +x ./mj

      - name: Test Release
        run: ./mj example/example.csv --sort

      # Archived ; legacy
#      - name: Upload the artifacts
#        uses: skx/github-action-publish-binaries@master
#        env:
#          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
#        with:
#          args: 'mj*'

      # Upload the binaries to the Releases if there is a git tag.
      # Docs: https://github.com/softprops/action-gh-release
      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          append_body: true
          preserve_order: true
          files: |
            mj
            mj.exe